server:
  port: 0

spring:
  application:
    name: xml-signing-service-cdc-test

  main:
    allow-bean-definition-overriding: true

  # PostgreSQL (Docker test container on port 5433)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:xmlsigning_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  # JPA with PostgreSQL dialect
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  # Flyway enabled (runs real migrations)
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Camel disabled for CDC tests (no consumer route needed)
camel:
  springboot:
    main-run-controller: false
  dataformat:
    jackson:
      auto-discover-object-mapper: true

# Application-specific configuration
app:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9093}
    topics:
      saga-command-xml-signing: saga.command.xml-signing
      saga-compensation-xml-signing: saga.compensation.xml-signing
      saga-reply-xml-signing: saga.reply.xml-signing
      dlq: xml.signing.dlq

  csc:
    service-url: http://localhost:19000
    oauth2:
      client-id: test-client
    credential-id: test-credential
    hash-algorithm-oid: 2.16.840.1.101.3.4.2.1
    digest-algorithm: SHA-256
    pin: test-pin-1234

  signing:
    max-retries: 3

# Disable Eureka for tests
eureka:
  client:
    enabled: false

# Actuator (minimal for tests)
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health

# Logging
logging:
  level:
    root: WARN
    com.wpanther.xmlsigning: DEBUG
    org.apache.kafka: WARN
