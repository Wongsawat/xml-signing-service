server:
  port: 0

spring:
  application:
    name: xml-signing-service-consumer-test

  main:
    allow-bean-definition-overriding: true

  # PostgreSQL (Docker test container on port 5433)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:xmlsigning_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 5

  # JPA with PostgreSQL dialect
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  # Flyway enabled (runs real migrations)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Kafka configuration (Docker test container on port 9093)
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9093}
    consumer:
      group-id: xml-signing-consumer-test
      auto-offset-reset: earliest
      enable-auto-commit: false

# Apache Camel
camel:
  springboot:
    name: xml-signing-camel-consumer-test
    main-run-controller: false
  dataformat:
    jackson:
      auto-discover-object-mapper: true

# Disable Eureka for tests
eureka:
  client:
    enabled: false

# Application-specific configuration (same topic names as production)
app:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9093}
    topics:
      saga-command-xml-signing: saga.command.xml-signing
      saga-compensation-xml-signing: saga.compensation.xml-signing
      saga-reply-xml-signing: saga.reply.xml-signing
      dlq: xml.signing.dlq

  csc:
    service-url: http://localhost:19000
    oauth2:
      client-id: test-client
    credential-id: test-credential
    hash-algorithm-oid: 2.16.840.1.101.3.4.2.1
    digest-algorithm: SHA-256

  signing:
    max-retries: 3
    timeout-seconds: 30
    max-allowed-retries: 10
    max-allowed-timeout-seconds: 300
    min-allowed-timeout-seconds: 5

  # MinIO config (mocked via @MockBean XmlStoragePort in tests)
  minio:
    endpoint: http://localhost:9001
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: signed-xml-documents
    region: us-east-1
    base-url: http://localhost:9001/signed-xml-documents
    path-style-access: true
    max-upload-size-bytes: 102400
    cleanup:
      enabled: false

# Disable Resilience4j circuit breaker health indicator (avoids StatusAggregator bean requirement)
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
    instances:
      cscAuthClient:
        base-config: default
      cscSignatureClient:
        base-config: default
  timelimiter:
    instances:
      cscAuthClient:
        timeout-duration: 30s
      cscSignatureClient:
        timeout-duration: 30s

# Actuator (minimal for tests)
management:
  health:
    circuitbreakers:
      enabled: false

# Logging
logging:
  level:
    root: WARN
    com.wpanther.xmlsigning: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.springframework.kafka: INFO
