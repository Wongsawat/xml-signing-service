server:
  port: 8086

spring:
  application:
    name: xml-signing-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xmlsigning_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

# Apache Camel configuration
camel:
  springboot:
    name: xml-signing-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  cloud:
    openfeign:
      client:
        config:
          default:
            # Connection timeout in milliseconds (time to establish connection)
            connectTimeout: 10000  # 10 seconds
            # Read timeout in milliseconds (time waiting for response)
            readTimeout: 30000     # 30 seconds
            # Logger level: BASIC, HEADERS, FULL (can be overridden by FeignConfig bean)
            loggerLevel: BASIC

# Application-specific configuration
app:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    topics:
      # Saga topics
      saga-command-xml-signing: saga.command.xml-signing
      saga-compensation-xml-signing: saga.compensation.xml-signing
      saga-reply-xml-signing: saga.reply.xml-signing
      dlq: xml.signing.dlq

  # CSC API Configuration
  csc:
    service-url: ${CSC_SERVICE_URL:http://localhost:9000}
    oauth2:
      client-id: ${CSC_CLIENT_ID:etax-invoice-service}
      client-secret: ${CSC_CLIENT_SECRET:}
    credential-id: ${CSC_CREDENTIAL_ID:default-credential}
    hash-algorithm-oid: ${CSC_HASH_ALGORITHM_OID:2.16.840.1.101.3.4.2.1}
    digest-algorithm: ${CSC_DIGEST_ALGORITHM:SHA-256}

  # Signing configuration
  signing:
    # Number of retry attempts for failed signing operations
    max-retries: ${SIGNING_MAX_RETRIES:3}
    # Timeout for signing operations (in seconds)
    timeout-seconds: ${SIGNING_TIMEOUT_SECONDS:30}
    # Configuration validation limits
    max-allowed-retries: ${SIGNING_MAX_ALLOWED_RETRIES:10}
    max-allowed-timeout-seconds: ${SIGNING_MAX_ALLOWED_TIMEOUT_SECONDS:300}
    min-allowed-timeout-seconds: ${SIGNING_MIN_ALLOWED_TIMEOUT_SECONDS:5}

  # MinIO (S3-compatible) for signed XML storage
  # Note: Default port changed from 9000 to 9001 to avoid conflict with eidasremotesigning (CSC service)
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9001}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:signed-xml-documents}
    region: ${MINIO_REGION:us-east-1}
    base-url: ${MINIO_BASE_URL:http://localhost:9001/signed-xml-documents}
    path-style-access: ${MINIO_PATH_STYLE_ACCESS:true}

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    instance:
      prefer-ip-address: true

# Circuit breaker configuration
resilience4j:
  circuitbreaker:
    instances:
      cscSignatureClient:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
      cscAuthClient:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
  retry:
    instances:
      cscSignatureClient:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      cscAuthClient:
        max-attempts: 2
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  timelimiter:
    instances:
      cscSignatureClient:
        timeout-duration: 30s
      cscAuthClient:
        timeout-duration: 10s

# Actuator endpoints
management:
  endpoints:
    enabled-by-default: false
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  health:
    circuitbreakers:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# Production logging configuration
logging:
  level:
    root: WARN
    com.wpanther.xmlsigning: INFO
    # Application layer - business operations
    com.wpanther.xmlsigning.application: INFO
    # Domain layer - core business logic
    com.wpanther.xmlsigning.domain: INFO
    # Infrastructure - CSC clients (WARN for failures, INFO for normal flow)
    com.wpanther.xmlsigning.infrastructure.client: WARN
    # Infrastructure - messaging
    com.wpanther.xmlsigning.infrastructure.messaging: INFO
    # Infrastructure - persistence
    com.wpanther.xmlsigning.infrastructure.persistence: WARN
    # Infrastructure - storage
    com.wpanther.xmlsigning.infrastructure.storage: INFO
    # Hibernate SQL (set to DEBUG only for troubleshooting slow queries)
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    # Spring framework
    org.springframework: WARN
    org.springframework.transaction: WARN
    # Apache Camel
    org.apache.camel: INFO
    # Resilience4j circuit breaker events
    io.github.resilience4j: INFO
    # Kubernetes
    io.kubernetes: WARN
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId},%X{sagaId},%X{documentId}] %logger{36} - %msg%n"
