server:
  port: 8086

spring:
  application:
    name: xml-signing-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xmlsigning_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

# Apache Camel configuration
camel:
  springboot:
    name: xml-signing-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 10000
            readTimeout: 30000
            loggerLevel: FULL

# Application-specific configuration
app:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    topics:
      # Saga topics
      saga-command-xml-signing: saga.command.xml-signing
      saga-compensation-xml-signing: saga.compensation.xml-signing
      saga-reply-xml-signing: saga.reply.xml-signing
      dlq: xml.signing.dlq

  # CSC API Configuration
  csc:
    service-url: ${CSC_SERVICE_URL:http://localhost:9000}
    client-id: ${CSC_CLIENT_ID:etax-invoice-service}
    credential-id: ${CSC_CREDENTIAL_ID:default-credential}
    # PIN-based authentication is deprecated in favor of SAD token authentication
    # pin: ${CSC_PIN:1234}
    hash-algorithm: ${CSC_HASH_ALGORITHM:SHA256}
    signature-level: ${CSC_SIGNATURE_LEVEL:XAdES-BASELINE-T}
    digest-algorithm: ${CSC_DIGEST_ALGORITHM:SHA256}

  # Signing configuration
  signing:
    max-retries: ${SIGNING_MAX_RETRIES:3}
    timeout-seconds: ${SIGNING_TIMEOUT_SECONDS:30}

  # MinIO (S3-compatible) for signed XML storage
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET_NAME:signed-xml-documents}
    region: ${MINIO_REGION:us-east-1}
    base-url: ${MINIO_BASE_URL:http://localhost:9000/signed-xml-documents}
    path-style-access: ${MINIO_PATH_STYLE_ACCESS:true}

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes,circuitbreakers
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  health:
    circuitbreakers:
      enabled: true

# Resilience4j circuit breaker configuration for CSC API clients
resilience4j:
  circuitbreaker:
    metrics:
      enabled: true
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      cscAuthClient:
        base-config: default
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
      cscSignatureClient:
        base-config: default
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
  timelimiter:
    metrics:
      enabled: true
    configs:
      default:
        timeout-duration: 30s
    instances:
      cscAuthClient:
        base-config: default
        timeout-duration: 30s
      cscSignatureClient:
        base-config: default
        timeout-duration: 30s
  retry:
    metrics:
      enabled: true
    configs:
      default:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.net.SocketException
          - java.io.IOException
        ignore-exceptions:
          - java.lang.IllegalArgumentException
    instances:
      cscAuthClient:
        base-config: default
        max-attempts: 3
      cscSignatureClient:
        base-config: default
        max-attempts: 2  # Don't retry signature failures (SAD token is single-use)
  bulkhead:
    metrics:
      enabled: true
    configs:
      default:
        max-concurrent-calls: 10
        max-wait-duration: 0s

# Logging configuration
logging:
  level:
    root: INFO
    com.wpanther.xmlsigning: DEBUG
    org.apache.camel: WARN
    org.apache.camel.component.kafka: WARN
    org.hibernate.SQL: WARN
    feign: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
