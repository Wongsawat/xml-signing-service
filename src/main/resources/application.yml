server:
  port: 8086

spring:
  application:
    name: xml-signing-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:xmlsigning_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

# Apache Camel configuration
camel:
  springboot:
    name: xml-signing-camel
    main-run-controller: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 10000
            readTimeout: 30000
            loggerLevel: FULL

# Application-specific configuration
app:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    topics:
      xml-signing-requested: xml.signing.requested
      # Type-specific output topics for signed XML documents
      xml-signed-tax-invoice: xml.signed.tax-invoice
      xml-signed-receipt: xml.signed.receipt
      xml-signed-invoice: xml.signed.invoice
      xml-signed-debit-credit-note: xml.signed.debit-credit-note
      xml-signed-cancellation: xml.signed.cancellation
      xml-signed-abbreviated: xml.signed.abbreviated
      dlq: xml.signing.dlq

  # CSC API Configuration
  csc:
    service-url: ${CSC_SERVICE_URL:http://localhost:9000}
    client-id: ${CSC_CLIENT_ID:etax-invoice-service}
    credential-id: ${CSC_CREDENTIAL_ID:default-credential}
    hash-algorithm: ${CSC_HASH_ALGORITHM:SHA256}
    signature-level: ${CSC_SIGNATURE_LEVEL:XAdES-BASELINE-T}
    digest-algorithm: ${CSC_DIGEST_ALGORITHM:SHA256}

  # Signing configuration
  signing:
    max-retries: ${SIGNING_MAX_RETRIES:3}
    timeout-seconds: ${SIGNING_TIMEOUT_SECONDS:30}

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Logging configuration
logging:
  level:
    root: INFO
    com.invoice.xmlsigning: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.hibernate.SQL: DEBUG
    feign: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
